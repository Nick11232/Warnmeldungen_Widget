<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Warnmeldungen Östringen</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
color:white;
}

#wrapper{
width:355px;
height:217px;
padding:20px;
box-sizing:border-box;

background-image:url("https://i.ibb.co/Jj5VHVzY/Vorlage-Divera-Ticker-5.png");
background-size:cover;
background-position:center;
background-repeat:no-repeat;

margin-top:-5px;
border-radius:0px;

position:relative;
}

h1{
font-size:18px;
margin-bottom:18px;
margin-top:0px;
margin-left:23px;
}

.warning{
background:#b30000;
padding:15px;
border-radius:20px;
margin-bottom:40px;
}

.warning h2{
font-size:15px;
margin:0 0 20px 0;
}

.warning p{
font-size:15px;
}

.no-warning{
background:#0f7a32;
padding:20px;
border-radius:20px;
font-size:15px;
}

.disclaimer{
position:absolute;
bottom:3px;
left:10px;
right:10px;
font-size:4px;
opacity:0.8;
line-height:1.2;
}

</style>
</head>

<body>

<div id="wrapper">

<h1>⚠️ Warnmeldungen Östringen</h1>

<div id="warnings">Lade aktuelle Warnmeldungen...</div>

<div class="disclaimer">
Quelle: Bundesamt für Bevölkerungsschutz und Katastrophenhilfe (BBK) – warnung.bund.de. 
Privates Informationsangebot. Keine Gewähr für Aktualität, Richtigkeit oder Vollständigkeit.
</div>

</div>

<script>

const city = "Östringen";

async function loadWarnings(){

const container = document.getElementById("warnings");

try{

const response = await fetch("https://api.allorigins.win/raw?url=https://warnung.bund.de/bbk.rss");
const text = await response.text();

const parser = new DOMParser();
const xml = parser.parseFromString(text,"text/xml");

const items = xml.querySelectorAll("item");

container.innerHTML="";

let found=false;

items.forEach(item=>{

const title=item.querySelector("title").textContent;
const desc=item.querySelector("description").textContent;

if(title.includes(city) || desc.includes(city)){

found=true;

const div=document.createElement("div");
div.className="warning";

div.innerHTML=`
<h2>${title}</h2>
<p>${desc}</p>
`;

container.appendChild(div);

}

});

if(!found){

container.innerHTML=`
<div class="no-warning">
✅ Aktuell liegen keine Warnungen vor.
</div>
`;

}

}catch(err){

container.innerHTML=`
<div class="warning">
<h2>Fehler beim Laden der Warnmeldungen</h2>
<p>Bitte Verbindung prüfen.</p>
</div>
`;

}

}

loadWarnings();
setInterval(loadWarnings,60000);

</script>

</body>
</html>
