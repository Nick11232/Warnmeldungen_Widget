<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Warnmeldungen Östringen</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:#0b1f3a;
color:white;
}

#wrapper{
width:500px;
height:200px;
padding:40px;
box-sizing:border-box;
}

h1{
font-size:20px;
margin-bottom:40px;
margin-left:50px;
}

.warning{
background:#b30000;
padding:40px;
border-radius:20px;
margin-bottom:40px;
}

.warning h2{
font-size:20px;
margin:0 0 20px 0;
}

.warning p{
font-size:20px;
}

.no-warning{
background:#0f7a32;
padding:20px;
border-radius:20px;
font-size:20px;
}

</style>
</head>

<body>

<div id="wrapper">

<h1>⚠️ Warnmeldungen Östringen</h1>

<div id="warnings">Lade aktuelle Warnmeldungen...</div>

</div>

<script>

const city = "Östringen";

async function loadWarnings(){

const container = document.getElementById("warnings");

try{

const response = await fetch("https://api.allorigins.win/raw?url=https://warnung.bund.de/bbk.rss");
const text = await response.text();

const parser = new DOMParser();
const xml = parser.parseFromString(text,"text/xml");

const items = xml.querySelectorAll("item");

container.innerHTML="";

let found=false;

items.forEach(item=>{

const title=item.querySelector("title").textContent;
const desc=item.querySelector("description").textContent;

if(title.includes(city) || desc.includes(city)){

found=true;

const div=document.createElement("div");
div.className="warning";

div.innerHTML=`
<h2>${title}</h2>
<p>${desc}</p>
`;

container.appendChild(div);

}

});

if(!found){

container.innerHTML=`
<div class="no-warning">
✅ Aktuell liegen keine Warnmeldungen für Östringen vor.
</div>
`;

}

}catch(err){

container.innerHTML=`
<div class="warning">
<h2>Fehler beim Laden der Warnmeldungen</h2>
<p>Bitte Verbindung prüfen.</p>
</div>
`;

}

}

loadWarnings();
setInterval(loadWarnings,60000);

</script>

</body>
</html>
